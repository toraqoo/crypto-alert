name: 📊 암호화폐 모닝 브리핑

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4
      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 📦 패키지 설치
        run: pip install requests
      - name: 🚀 알림 발송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py
